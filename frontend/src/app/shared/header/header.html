<div class="navbar bg-base-100 shadow-sm">

  <button [cdkMenuTriggerFor]="menu" class="btn btn-ghost btn-circle">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
    </svg>
  </button>

  <ng-template #menu>
    <div class="bg-base-100 rounded-box mt-3 w-52 p-2 shadow flex flex-col " cdkMenu>
      <button routerLink="/admin/category" class="cursor-pointer text-xs w-full text-start p-1 rounded hover:border"
        cdkMenuItem>Categorías</button>
      <button routerLink="/admin/product" class="cursor-pointer text-xs w-full text-start p-1 rounded hover:border"
        cdkMenuItem>Productos</button>
      <button routerLink="/home" class="cursor-pointer text-xs w-full text-start p-1 rounded hover:border"
        cdkMenuItem>Home</button>
    </div>
  </ng-template>

  <div class="flex-1">
    <a routerLink="/home"  class="btn btn-ghost text-xl">Mi Catalogo</a>
  </div>

  <div class="flex-none">
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
        <div class="indicator">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span class="badge badge-sm indicator-item">8</span>
        </div>
      </div>
      <div tabindex="0" class="card card-compact dropdown-content bg-base-100 z-1 mt-3 w-52 shadow">
        <div class="card-body">
          <span class="text-lg font-bold">8 Items</span>
          <span class="text-info">Subtotal: $999</span>
          <div class="card-actions">
            <button class="btn btn-primary btn-block">View cart</button>
          </div>
        </div>
      </div>
    </div>

    @if (isLoggedIn()) {
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
          <img alt="Img" [src]="avatar()" />
        </div>
      </div>
      <div class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <ul tabindex="-1" class="mt-3  p-1 shadow">
          <div class="flex flex-row ">
            <div class="avatar pr-2">
              <div class="w-10 rounded-full">
                <img [src]="avatar()" />
              </div>
            </div>
            <div class="text-left">
              <p>{{ userName() }}</p>
              <p>{{ userLastName() }}</p>
            </div>
          </div>
          <div class="divider"></div>
          <li routerLink="/profile">
            <a class="justify-between">
              Profile
              <span class="badge">New</span>
            </a>
          </li>
          <li class="" (click)="logOut()"><a>Logout</a></li>
          <li>
            <label class="flex cursor-pointer gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5" />
                <path
                  d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
              </svg>
              <input type="checkbox" value="lofi" class="toggle theme-controller" />
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </label>
          </li>
        </ul>
      </div>

    </div>
    } @else {
    <button class="btn-neutral hover:bg-primary-content hover:cursor-pointer" routerLink="/login">
      <fa-icon [icon]="faRightFromBracket"></fa-icon>
    </button>
    }


  </div>
