<div class="card bg-base-100 border-base-300 border shadow-sm">
  <div class="card-body gap-3">
    <h3 class="card-title text-base">Vista previa</h3>

    <div class="h-44 w-full overflow-hidden rounded-xl bg-base-200 flex items-center justify-center">
      @if (showImage) {
        <img
          class="h-full w-full object-cover"
          [ngSrc]="vm.thumbnailUrl || ''"
          [alt]="vm.name"
          width="400"
          height="176"
          loading="lazy"
          decoding="async"
          (error)="onImgError()"
        />
      } @else {
        <div class="flex flex-col items-center justify-center text-base-content/40">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-11Z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 15l3-3 2.5 2.5L16 11l3 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="1.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="text-xs mt-2">Sin imagen</span>
        </div>
      }
    </div>

    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0 max-w-3xs">
        <h4 class="text-lg font-semibold leading-tight truncate">{{ vm.name }}</h4>
        <p class="text-sm opacity-80 line-clamp-2">{{ vm.description }}</p>
      </div>
      <span
        class="badge"
        [class.badge-success]="vm.status === 'PUBLIC'"
        [class.badge-ghost]="vm.status === 'DRAFT'"
        [class.badge-neutral]="vm.status === 'ARCHIVED'">
        {{ vm.statusLabel }}
      </span>
    </div>

    <div class="flex items-center justify-between">
      <span class="font-semibold">{{ vm.priceLabel }}</span>
      <button class="btn btn-sm btn-primary btn-outline" type="button" disabled>Agregar</button>
    </div>
  </div>
</div>
