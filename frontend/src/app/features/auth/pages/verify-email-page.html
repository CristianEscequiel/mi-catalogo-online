<div class="min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div class="card bg-base-100 border border-base-300 rounded-2xl shadow-lg w-full max-w-md transition duration-300">
    <div class="card-body p-6 sm:p-8 text-center space-y-4">
      <h1 class="card-title justify-center text-2xl font-semibold">Verificación de email</h1>

      @if (isLoading()) {
        <div class="space-y-2">
          <span class="loading loading-spinner loading-md"></span>
          <p class="text-base-content/80">{{ message() }}</p>
        </div>
      } @else {
        <div class="space-y-2">
          <p class="text-base-content/90">{{ message() }}</p>
          @if (isVerified()) {
            <a routerLink="/login" class="btn btn-primary w-full">Ir a iniciar sesión</a>
          } @else {
            <a routerLink="/register" class="btn btn-outline w-full">Crear una cuenta</a>
          }
          <a routerLink="/home" class="btn btn-ghost w-full">Volver al inicio</a>
        </div>
      }
    </div>
  </div>
</div>
