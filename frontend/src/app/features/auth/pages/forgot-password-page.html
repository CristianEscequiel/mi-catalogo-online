<div class="min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div class="card bg-base-100 border border-base-300 rounded-2xl shadow-lg w-full max-w-md transition duration-300">
    <div class="card-body p-6 sm:p-8">
      <h1 class="card-title justify-center text-2xl font-semibold">Recuperar contrasena</h1>

      <p class="text-base-content/80 text-center">
        Ingresá tu email y te enviaremos un enlace para restablecer tu contrasena.
      </p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5" novalidate>
        <div class="space-y-2">
          <label for="email" class="label p-0">
            <span class="label-text font-medium">Email</span>
          </label>
          <input
            id="email"
            formControlName="email"
            type="email"
            class="input input-bordered w-full transition duration-300 focus:border-primary"
            placeholder="tu@email.com"
            autocomplete="email"
          />
          @if (form.controls.email.touched && form.controls.email.invalid) {
            <p class="text-error text-sm">Ingresa un email valido.</p>
          }
        </div>

        <button
          [disabled]="isLoading || !form.valid"
          class="btn btn-primary w-full transition duration-300"
          type="submit"
        >
          @if (isLoading) {
            <span class="inline-flex items-center gap-2">
              <span class="loading loading-spinner loading-sm"></span>
              Enviando...
            </span>
          } @else {
            Enviar enlace de recuperacion
          }
        </button>
      </form>

      <p class="text-sm text-center text-base-content/80">
        ¿Recordaste tu contrasena?
        <a routerLink="/auth/login" class="link link-primary">Iniciar sesion</a>
      </p>
    </div>
  </div>
</div>
