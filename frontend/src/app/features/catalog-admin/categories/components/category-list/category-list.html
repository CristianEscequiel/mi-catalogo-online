<div class="px-3 py-2 md:px-4">
  <app-admin-toolbar
    [searchControl]="searchControl"
    searchPlaceholder="Buscar categoría"
    buttonLabel="+ Nueva Categoria"
    (create)="onCreate()"
  />

  <div class="space-y-3 md:hidden">
    @for (row of filteredCategories; track row.id) {
      <app-category-mobile-card
        [category]="row"
        (edit)="onEdit($event)"
        (remove)="onDelete($event)"
      />
    } @empty {
      <div class="rounded-2xl border border-base-300 bg-base-200 p-4 text-center text-sm opacity-70">
        No hay categorías para mostrar.
      </div>
    }
  </div>
</div>

<div class="hidden md:block md:px-4">
<table cdk-table [dataSource]="filteredCategories" class="table w-full rounded-box bg-base-200">
  <ng-container cdkColumnDef="image">
    <th cdk-header-cell *cdkHeaderCellDef class="w-16">Img</th>
    <td cdk-cell *cdkCellDef="let row">
      @if (row.imageUrl) {
        <div class="avatar">
          <div class="w-12 rounded">
            <img [src]="resolveImageUrl(row.imageUrl)" [alt]="row.name" />
          </div>
        </div>
      } @else {
        <div class="avatar placeholder">
          <div class="w-12 rounded bg-base-300 text-xs flex items-center justify-center">
            Sin img
          </div>
        </div>
      }
    </td>
  </ng-container>

  <ng-container cdkColumnDef="name">
    <th cdk-header-cell *cdkHeaderCellDef>Nombre</th>
    <td cdk-cell *cdkCellDef="let row">
      <div class="flex flex-col">
        <span class="font-medium">{{ row.name }}</span>
      </div>
    </td>
  </ng-container>

  <ng-container cdkColumnDef="description">
    <th cdk-header-cell *cdkHeaderCellDef>Descripcion</th>
    <td cdk-cell *cdkCellDef="let row">
      <span class="text-sm">{{ row.description || '-' }}</span>
    </td>
  </ng-container>

  <ng-container cdkColumnDef="actions">
    <th cdk-header-cell *cdkHeaderCellDef class="text-right">Acciones</th>
    <td cdk-cell *cdkCellDef="let row" class="text-right">
      <div class="flex gap-2 justify-end">
        <button type="button" class="btn btn-xs btn-info btn-outline" (click)="onEdit(row)">Editar</button>
        <button type="button" class="btn btn-xs btn-error btn-outline" (click)="onDelete(row)">Eliminar</button>
      </div>
    </td>
  </ng-container>

  <tr cdk-header-row *cdkHeaderRowDef="displayedColumns"></tr>
  <tr cdk-row *cdkRowDef="let row; columns: displayedColumns"></tr>
</table>
</div>
